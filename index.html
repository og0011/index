<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网站收藏夹</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        dark: '#1e293b',
                        darker: '#0f172a',
                        light: '#f1f5f9',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-effect {
                @apply bg-white/10 backdrop-blur-lg border border-white/20;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-card-hover hover:-translate-y-1;
            }
            .category-active {
                @apply bg-primary text-white;
            }
            .category-inactive {
                @apply bg-dark text-secondary hover:bg-dark/80;
            }
            .dragging {
                @apply transform rotate-2 scale-105 z-50 opacity-80 pointer-events-none shadow-xl !important;
            }
            .drag-over {
                @apply transform scale-102 border-2 border-dashed border-primary/50 bg-primary/10;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-darker to-dark min-h-screen text-light p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                我的网站收藏夹
            </h1>
            <p class="text-secondary">整理你常用的网站，让访问更高效</p>
        </header>

        <!-- Search Bar -->
        <div class="mb-8">
            <div class="relative max-w-2xl mx-auto">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="搜索收藏的网站..." 
                    class="w-full px-6 py-4 rounded-xl glass-effect focus:outline-none focus:ring-2 focus:ring-primary"
                >
                <button id="addSiteBtn" class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-primary hover:bg-primary/80 text-white px-4 py-2 rounded-lg transition-colors">
                    <i class="fa fa-plus mr-2"></i>添加
                </button>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="flex flex-wrap justify-center gap-3 mb-8">
            <div id="categoryContainer" class="flex flex-wrap justify-center gap-3">
                <button class="category-btn category-active px-6 py-3 rounded-lg transition-colors" data-category="all">
                    全部
                </button>
                <button class="category-btn category-inactive px-6 py-3 rounded-lg transition-colors relative group" data-category="工具">
                    工具
                    <button class="absolute -top-2 -right-2 text-red-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                            onclick="event.stopPropagation(); showDeleteCategoryConfirm('工具')">
                        <i class="fa fa-times-circle"></i>
                    </button>
                </button>
                <button class="category-btn category-inactive px-6 py-3 rounded-lg transition-colors relative group" data-category="学习">
                    学习
                    <button class="absolute -top-2 -right-2 text-red-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                            onclick="event.stopPropagation(); showDeleteCategoryConfirm('学习')">
                        <i class="fa fa-times-circle"></i>
                    </button>
                </button>
                <button class="category-btn category-inactive px-6 py-3 rounded-lg transition-colors relative group" data-category="娱乐">
                    娱乐
                    <button class="absolute -top-2 -right-2 text-red-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                            onclick="event.stopPropagation(); showDeleteCategoryConfirm('娱乐')">
                        <i class="fa fa-times-circle"></i>
                    </button>
                </button>
                <button class="category-btn category-inactive px-6 py-3 rounded-lg transition-colors relative group" data-category="社交">
                    社交
                    <button class="absolute -top-2 -right-2 text-red-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                            onclick="event.stopPropagation(); showDeleteCategoryConfirm('社交')">
                        <i class="fa fa-times-circle"></i>
                    </button>
                </button>
                <button class="category-btn category-inactive px-6 py-3 rounded-lg transition-colors relative group" data-category="资讯">
                    资讯
                    <button class="absolute -top-2 -right-2 text-red-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                            onclick="event.stopPropagation(); showDeleteCategoryConfirm('资讯')">
                        <i class="fa fa-times-circle"></i>
                    </button>
                </button>
                <button id="addCategoryBtn" class="category-btn category-inactive px-6 py-3 rounded-lg transition-colors" data-category="add">
                    <i class="fa fa-plus mr-2"></i>添加分类
                </button>
            </div>
        </div>

        <!-- Website Grid -->
        <div id="websiteGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 auto-cols-fr">
            <!-- Websites will be dynamically added here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="text-6xl mb-4 opacity-50">📁</div>
            <h3 class="text-xl font-semibold mb-2">还没有收藏的网站</h3>
            <p class="text-secondary mb-6">点击"添加"按钮开始收藏你的第一个网站</p>
            <button id="emptyAddBtn" class="bg-primary hover:bg-primary/80 text-white px-6 py-3 rounded-lg transition-colors">
                <i class="fa fa-plus mr-2"></i>添加网站
            </button>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirmDialog" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-dark p-8 rounded-2xl max-w-md w-full mx-4 glass-effect text-center">
            <div class="text-4xl mb-4">⚠️</div>
            <h3 id="confirmTitle" class="text-xl font-bold mb-3">确认操作</h3>
            <p id="confirmMessage" class="text-secondary mb-6">您确定要执行此操作吗？</p>
            <div class="flex gap-3">
                <button id="confirmCancelBtn" class="flex-1 px-6 py-3 rounded-lg bg-dark hover:bg-dark/80 transition-colors">
                    取消
                </button>
                <button id="confirmOkBtn" class="flex-1 px-6 py-3 rounded-lg bg-red-500 hover:bg-red-600 text-white transition-colors">
                    确认删除
                </button>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div id="addCategoryModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-dark p-8 rounded-2xl max-w-md w-full mx-4 glass-effect">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">添加分类</h3>
                <button id="closeCategoryModalBtn" class="text-secondary hover:text-light text-2xl">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            
            <form id="addCategoryForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">分类名称</label>
                    <input type="text" id="categoryName" required class="w-full px-4 py-3 rounded-lg glass-effect focus:outline-none focus:ring-2 focus:ring-primary" placeholder="请输入分类名称">
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="button" id="cancelAddCategoryBtn" class="flex-1 px-6 py-3 rounded-lg bg-dark hover:bg-dark/80 transition-colors">
                        取消
                    </button>
                    <button type="submit" class="flex-1 px-6 py-3 rounded-lg bg-primary hover:bg-primary/80 text-white transition-colors">
                        添加
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Website Modal -->
    <div id="addModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-dark p-8 rounded-2xl max-w-md w-full mx-4 glass-effect">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">添加网站</h3>
                <button id="closeModalBtn" class="text-secondary hover:text-light text-2xl">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            
            <form id="addSiteForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">网站名称</label>
                    <input type="text" id="siteName" required class="w-full px-4 py-3 rounded-lg glass-effect focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">网站地址</label>
                    <input type="url" id="siteUrl" required class="w-full px-4 py-3 rounded-lg glass-effect focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">分类</label>
                    <select id="siteCategory" required class="w-full px-4 py-3 rounded-lg glass-effect focus:outline-none focus:ring-2 focus:ring-primary text-light bg-dark/80">
                        <option value="" class="bg-dark text-light">请选择分类</option>
                        <option value="工具" class="bg-dark text-light">工具</option>
                        <option value="学习" class="bg-dark text-light">学习</option>
                        <option value="娱乐" class="bg-dark text-light">娱乐</option>
                        <option value="社交" class="bg-dark text-light">社交</option>
                        <option value="资讯" class="bg-dark text-light">资讯</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">选择图标</label>
                    <div class="grid grid-cols-8 gap-2 max-h-40 overflow-y-auto p-2 bg-dark/50 rounded-lg">
                        <div class="icon-option cursor-pointer p-2 rounded-lg hover:bg-primary/20 text-center" data-icon="fa-globe">
                            <i class="fa fa-globe text-2xl"></i>
                        </div>
                        <div class="icon-option cursor-pointer p-2 rounded-lg hover:bg-primary/20 text-center" data-icon="fa-github">
                            <i class="fa fa-github text-2xl"></i>
                        </div>
                        <div class="icon-option cursor-pointer p-2 rounded-lg hover:bg-primary/20 text-center" data-icon="fa-code">
                            <i class="fa fa-code text-2xl"></i>
                        </div>
                        <div class="icon-option cursor-pointer p-2 rounded-lg hover:bg-primary/20 text-center" data-icon="fa-youtube-play">
                            <i class="fa fa-youtube-play text-2xl"></i>
                        </div>
                        <div class="icon-option cursor-pointer p-2 rounded-lg hover:bg-primary/20 text-center" data-icon="fa-twitter">
                            <i class="fa fa-twitter text-2xl"></i>

    <script>
        // Sample data
        const sampleWebsites = [
            {
                id: 1,
                name: 'GitHub',
                url: 'https://github.com',
                category: '工具',
                tags: ['代码', '开发', '版本控制'],

            {

            },
            {
                id: 3,
                name: 'YouTube',
                url: 'https://youtube.com',
                category: '娱乐',
                tags: ['视频', '音乐', '教程'],
                icon: 'fa-youtube-play'
            },
            {
                id: 4,
                name: 'Twitter',
                url: 'https://twitter.com',

                tags: ['社交媒体', '新闻', '交流'],
                icon: 'fa-twitter'
            },
            {
                id: 5,
                name: 'Stack Overflow',
                url: 'https://stackoverflow.com',
                category: '工具',
                tags: ['编程', '问答', '帮助'],

            },
            {

                name: 'Reddit',
                url: 'https://reddit.com',

            },
            {
                id: 7,
                name: 'Google',
                url: 'https://google.com',
                category: '工具',
                tags: ['搜索', '引擎'],
                icon: 'fa-google'
            },
            {
                id: 8,
                name: 'CNN',
                url: 'https://cnn.com',
                category: '资讯',
                tags: ['新闻', '国际', '时事'],
                icon: 'fa-newspaper-o'
            }
        ];

        // DOM Elements
        const websiteGrid = document.getElementById('websiteGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const addSiteBtn = document.getElementById('addSiteBtn');
        const emptyAddBtn = document.getElementById('emptyAddBtn');
        const addModal = document.getElementById('addModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelAddBtn = document.getElementById('cancelAddBtn');
        const addSiteForm = document.getElementById('addSiteForm');
        const categoryContainer = document.getElementById('categoryContainer');
        const addCategoryBtn = document.getElementById('addCategoryBtn');
        const confirmDialog = document.getElementById('confirmDialog');
        const confirmTitle = document.getElementById('confirmTitle');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmOkBtn = document.getElementById('confirmOkBtn');
        const confirmCancelBtn = document.getElementById('confirmCancelBtn');
        const addCategoryModal = document.getElementById('addCategoryModal');
        const closeCategoryModalBtn = document.getElementById('closeCategoryModalBtn');
        const cancelAddCategoryBtn = document.getElementById('cancelAddCategoryBtn');
        const addCategoryForm = document.getElementById('addCategoryForm');
        const categoryNameInput = document.getElementById('categoryName');
        const selectedIconInput = document.getElementById('selectedIcon');
        const iconOptions = document.querySelectorAll('.icon-option');

        // State
        let websites = JSON.parse(localStorage.getItem('bookmarkWebsites')) || sampleWebsites;
        let categories = JSON.parse(localStorage.getItem('bookmarkCategories')) || ['工具', '学习', '娱乐', '社交', '资讯'];
        let currentCategory = 'all';
        let searchTerm = '';
        let confirmCallback = null;

        // Initialize
        function init() {
            renderCategories();
            updateCategorySelect();
            renderWebsites();
            setupEventListeners();
            saveToLocalStorage();
            saveCategoriesToLocalStorage();
        }

        // Initialize drag and drop functionality
        function initializeDragAndDrop() {
            const cards = websiteGrid.querySelectorAll('.website-card');
            
            cards.forEach((card, index) => {
                // Add drag attributes
                card.setAttribute('draggable', 'true');
                card.dataset.index = index;
                
                // Bind drag events
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('dragenter', handleDragEnter);
                card.addEventListener('dragleave', handleDragLeave);
                card.addEventListener('drop', handleDrop);
                
                // Add long press support for mobile
                let pressTimer;
                card.addEventListener('mousedown', (e) => {
                    if (e.button === 0) { // Left mouse button
                        pressTimer = setTimeout(() => {
                            handleLongPress(e, card);
                        }, 500); // 500ms threshold for long press
                    }
                });
                
                card.addEventListener('mouseup', () => {
                    clearTimeout(pressTimer);
                });
                
                card.addEventListener('mouseleave', () => {
                    clearTimeout(pressTimer);
                });
                
                // Touch events for mobile
                card.addEventListener('touchstart', (e) => {
                    pressTimer = setTimeout(() => {
                        handleLongPress(e, card);
                    }, 500);
                });
                
                card.addEventListener('touchend', () => {
                    clearTimeout(pressTimer);
                });
            });
        }
        
        // Handle long press to initiate drag
        function handleLongPress(e, card) {
            e.preventDefault();
            
            // Create a visual indicator that dragging is active
            card.classList.add('dragging');
            
            // Set up dragged item
            draggedItem = card;
            dragStartIndex = parseInt(card.dataset.index);
            
            // Simulate drag start
            const dragStartEvent = new DragEvent('dragstart', {
                bubbles: true,
                cancelable: true,
                dataTransfer: new DataTransfer()
            });
            
            card.dispatchEvent(dragStartEvent);
            
            // Show instructions
            showNotification('拖动卡片到目标位置以重新排序');
            
            // Add temporary event listeners for mouse movement
            document.addEventListener('mousemove', handleMouseMoveDuringDrag);
            document.addEventListener('mouseup', handleMouseUpDuringDrag);
            
            // Add touch event listeners for mobile
            document.addEventListener('touchmove', handleTouchMoveDuringDrag);
            document.addEventListener('touchend', handleMouseUpDuringDrag);
        }
        
        // Handle mouse movement during drag
        function handleMouseMoveDuringDrag(e) {
            if (draggedItem) {
                draggedItem.style.position = 'fixed';
                draggedItem.style.zIndex = '1000';
                draggedItem.style.pointerEvents = 'none';
                draggedItem.style.opacity = '0.8';
                draggedItem.style.transform = 'rotate(5deg) scale(1.05)';
                
                const rect = draggedItem.getBoundingClientRect();
                draggedItem.style.left = (e.clientX - rect.width / 2) + 'px';
                draggedItem.style.top = (e.clientY - rect.height / 2) + 'px';
                
                // Highlight potential drop targets
                const cards = websiteGrid.querySelectorAll('.website-card:not(.dragging)');
                cards.forEach(card => {
                    const cardRect = card.getBoundingClientRect();
                    const centerX = cardRect.left + cardRect.width / 2;
                    const centerY = cardRect.top + cardRect.height / 2;
                    
                    const distance = Math.sqrt(
                        Math.pow(e.clientX - centerX, 2) + 
                        Math.pow(e.clientY - centerY, 2)
                    );
                    
                    if (distance < 100) {
                        card.classList.add('drag-over');
                    } else {
                        card.classList.remove('drag-over');
                    }
                });
            }
        }
        
        // Handle touch movement during drag
        function handleTouchMoveDuringDrag(e) {
            if (draggedItem) {
                const touch = e.touches[0];
                handleMouseMoveDuringDrag({
                    clientX: touch.clientX,
                    clientY: touch.clientY
                });
            }
        }
        
        // Handle mouse up during drag
        function handleMouseUpDuringDrag(e) {
            if (draggedItem) {
                // Find the closest card to drop onto
                const cards = Array.from(websiteGrid.querySelectorAll('.website-card:not(.dragging)'));
                let closestCard = null;
                let minDistance = Infinity;
                
                const clientX = e.type === 'touchend' ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.type === 'touchend' ? e.changedTouches[0].clientY : e.clientY;
                
                cards.forEach(card => {
                    const cardRect = card.getBoundingClientRect();
                    const centerX = cardRect.left + cardRect.width / 2;
                    const centerY = cardRect.top + cardRect.height / 2;
                    
                    const distance = Math.sqrt(
                        Math.pow(clientX - centerX, 2) + 
                        Math.pow(clientY - centerY, 2)
                    );
                    
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestCard = card;
                    }
                });
                
                if (closestCard && minDistance < 150) {
                    const dropIndex = parseInt(closestCard.dataset.index);
                    performReorder(dragStartIndex, dropIndex);
                }
                
                // Reset dragged item
                draggedItem.style.position = '';
                draggedItem.style.zIndex = '';
                draggedItem.style.pointerEvents = '';
                draggedItem.style.opacity = '';
                draggedItem.style.transform = '';
                draggedItem.classList.remove('dragging');
                
                // Remove drag over highlights
                websiteGrid.querySelectorAll('.drag-over').forEach(card => {
                    card.classList.remove('drag-over');
                });
                
                draggedItem = null;
                dragStartIndex = -1;
                
                // Show completion message
                showNotification('排序已更新');
            }
            
            // Remove temporary event listeners
            document.removeEventListener('mousemove', handleMouseMoveDuringDrag);
            document.removeEventListener('mouseup', handleMouseUpDuringDrag);
            document.removeEventListener('touchmove', handleTouchMoveDuringDrag);
            document.removeEventListener('touchend', handleMouseUpDuringDrag);
        }
        
        // Handle drag start
        function handleDragStart(e) {
            this.classList.add('dragging');
            draggedItem = this;
            dragStartIndex = parseInt(this.dataset.index);
            
            if (e.dataTransfer) {
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', dragStartIndex);
            }
        }
        
        // Handle drag end
        function handleDragEnd() {
            this.classList.remove('dragging');
            websiteGrid.querySelectorAll('.drag-over').forEach(card => {
                card.classList.remove('drag-over');
            });
            
            if (draggedItem) {
                draggedItem.style.position = '';
                draggedItem.style.zIndex = '';
                draggedItem.style.pointerEvents = '';
                draggedItem.style.opacity = '';
                draggedItem.style.transform = '';
            }
            
            draggedItem = null;
            dragStartIndex = -1;
        }
        
        // Handle drag over
        function handleDragOver(e) {
            e.preventDefault();
            if (e.dataTransfer) {
                e.dataTransfer.dropEffect = 'move';
            }
        }
        
        // Handle drag enter
        function handleDragEnter(e) {
            if (this !== draggedItem) {
                this.classList.add('drag-over');
            }
        }
        
        // Handle drag leave
        function handleDragLeave() {
            this.classList.remove('drag-over');
        }
        
        // Handle drop
        function handleDrop(e) {
            e.preventDefault();
            
            if (this !== draggedItem) {
                const dropIndex = parseInt(this.dataset.index);
                performReorder(dragStartIndex, dropIndex);
            }
            
            this.classList.remove('drag-over');
        }
        
        // Perform the actual reordering
        function performReorder(startIndex, endIndex) {
            if (startIndex === endIndex) return;
            
            // Update websites array
            const [movedWebsite] = websites.splice(startIndex, 1);
            websites.splice(endIndex, 0, movedWebsite);
            
            // Save to localStorage
            localStorage.setItem('websites', JSON.stringify(websites));
            
            // Re-render websites
            renderWebsites();
            
            // Re-initialize drag and drop
            initializeDragAndDrop();
        }
        
        // Render websites
        function renderWebsites() {
            const filteredWebsites = websites.filter(site => {
                const matchesCategory = currentCategory === 'all' || site.category === currentCategory;
                const matchesSearch = searchTerm === '' || 
                    site.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    site.tags.some(tag => tag.toLowerCase().includes(searchTerm.toLowerCase()));
                return matchesCategory && matchesSearch;
            });

            if (filteredWebsites.length === 0) {
                websiteGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                websiteGrid.classList.remove('hidden');
                emptyState.classList.add('hidden');
                
                websiteGrid.innerHTML = filteredWebsites.map(site => `
                    <div class="flex flex-col items-center" onclick="window.open('${site.url}', '_blank')">
                        <div class="website-card glass-effect rounded-lg p-4 card-hover relative h-24 w-44 flex items-center justify-center mb-2 group">
                            <i class="fa ${site.icon || 'fa-globe'} text-primary text-2xl"></i>
                            <button class="absolute top-1 right-1 text-secondary hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity z-10"
                                     onclick="event.stopPropagation(); deleteWebsite(${site.id})">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                        <h3 class="text-center font-medium truncate text-sm w-full">${site.name}</h3>
                    </div>
                `).join('');
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Search
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderWebsites();
            });

            // Add category button
            addCategoryBtn.addEventListener('click', openAddCategoryModal);

            // Add category modal controls
            closeCategoryModalBtn.addEventListener('click', closeAddCategoryModal);
            cancelAddCategoryBtn.addEventListener('click', closeAddCategoryModal);
            
            // Close add category modal when clicking outside
            addCategoryModal.addEventListener('click', (e) => {
                if (e.target === addCategoryModal) {
                    closeAddCategoryModal();
                }
            });

            // Add category form
            addCategoryForm.addEventListener('submit', handleAddCategory);

            // Confirm dialog
            confirmOkBtn.addEventListener('click', () => {
                if (confirmCallback) {
                    confirmCallback();
                }
                closeConfirmDialog();
            });

            confirmCancelBtn.addEventListener('click', closeConfirmDialog);
            
            // Close confirm dialog when clicking outside
            confirmDialog.addEventListener('click', (e) => {
                if (e.target === confirmDialog) {
                    closeConfirmDialog();
                }
            });

            // Modal controls
            addSiteBtn.addEventListener('click', openModal);
            emptyAddBtn.addEventListener('click', openModal);
            closeModalBtn.addEventListener('click', closeModal);
            cancelAddBtn.addEventListener('click', closeModal);
            
            // Close modal when clicking outside
            addModal.addEventListener('click', (e) => {
                if (e.target === addModal) {
                    closeModal();
                }
            });

            // Icon selection
            iconOptions.forEach(option => {
                option.addEventListener('click', () => {
                    // Remove selected class from all options
                    iconOptions.forEach(opt => opt.classList.remove('bg-primary/30', 'ring-2', 'ring-primary'));
                    
                    // Add selected class to clicked option
                    option.classList.add('bg-primary/30', 'ring-2', 'ring-primary');
                    
                    // Update hidden input with selected icon
                    selectedIconInput.value = option.dataset.icon;
                });
            });

            // Add site form
            addSiteForm.addEventListener('submit', handleAddSite);
        }

        // Modal functions
        function openModal() {
            addModal.classList.remove('hidden');
            addModal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            addModal.classList.add('hidden');
            addModal.classList.remove('flex');
            document.body.style.overflow = 'auto';
            addSiteForm.reset();
        }

        // Handle add site
        function handleAddSite(e) {
            e.preventDefault();
            
            const name = document.getElementById('siteName').value;
            const url = document.getElementById('siteUrl').value;
            const category = document.getElementById('siteCategory').value;
            const selectedIcon = selectedIconInput.value;

            const newSite = {
                id: Date.now(),
                name,
                url: url.startsWith('http') ? url : 'https://' + url,
                category,
                tags: ['未分类'],
                icon: selectedIcon
            };

            websites.push(newSite);
            saveToLocalStorage();
            renderWebsites();
            closeModal();

            // Show success notification
            showNotification('网站添加成功！', 'success');
        }

        // Delete website
        function deleteWebsite(id) {
            const website = websites.find(site => site.id === id);
            if (website) {
                showConfirmDialog(
                    '删除网站',
                    `确定要删除 "${website.name}" 吗？`,
                    () => {
                        websites = websites.filter(site => site.id !== id);
                        saveToLocalStorage();
                        renderWebsites();
                        showNotification('网站已删除', 'success');
                    }
                );
            }
        }

        // Show delete category confirm
        function showDeleteCategoryConfirm(categoryName) {
            const sitesInCategory = websites.filter(site => site.category === categoryName).length;
            let message = `确定要删除分类 "${categoryName}" 吗？`;
            
            if (sitesInCategory > 0) {
                message += `\n该分类下还有 ${sitesInCategory} 个网站，删除后这些网站将被移至"未分类"。`;
            }
            
            showConfirmDialog(
                '删除分类',
                message,
                () => {
                    // Move sites to "未分类"
                    websites.forEach(site => {
                        if (site.category === categoryName) {
                            site.category = '未分类';
                        }
                    });
                    
                    // Remove category
                    categories = categories.filter(cat => cat !== categoryName);
                    
                    // Save changes
                    saveToLocalStorage();
                    saveCategoriesToLocalStorage();
                    
                    // Update UI
                    renderCategories();
                    updateCategorySelect();
                    renderWebsites();
                    
                    // Switch to all category if current category was deleted
                    if (currentCategory === categoryName) {
                        currentCategory = 'all';
                        updateCategoryButtons();
                    }
                    
                    showNotification('分类已删除', 'success');
                }
            );
        }

        // Show confirm dialog
        function showConfirmDialog(title, message, callback) {
            confirmTitle.textContent = title;
            confirmMessage.textContent = message;
            confirmCallback = callback;
            confirmDialog.classList.remove('hidden');
            confirmDialog.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        // Close confirm dialog
        function closeConfirmDialog() {
            confirmDialog.classList.add('hidden');
            confirmDialog.classList.remove('flex');
            document.body.style.overflow = 'auto';
            confirmCallback = null;
        }

        // Open add category modal
        function openAddCategoryModal() {
            addCategoryModal.classList.remove('hidden');
            addCategoryModal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            categoryNameInput.focus();
        }

        // Close add category modal
        function closeAddCategoryModal() {
            addCategoryModal.classList.add('hidden');
            addCategoryModal.classList.remove('flex');
            document.body.style.overflow = 'auto';
            addCategoryForm.reset();
        }

        // Handle add category
        function handleAddCategory(e) {
            e.preventDefault();
            
            const categoryName = categoryNameInput.value.trim();
            
            if (categoryName) {
                if (!categories.includes(categoryName)) {
                    categories.push(categoryName);
                    saveCategoriesToLocalStorage();
                    renderCategories();
                    updateCategorySelect();
                    closeAddCategoryModal();
                    showNotification('分类添加成功！', 'success');
                } else {
                    showNotification('该分类已存在！', 'error');
                }
            }
        }

        // Render categories
        function renderCategories() {
            const categoryContainer = document.getElementById('categoryContainer');
            const categoryButtons = categoryContainer.querySelectorAll('.category-btn:not([data-category="all"]):not([data-category="add"])');
            
            // Remove existing category buttons except "all" and "add"
            categoryButtons.forEach(btn => btn.remove());
            
            // Add category buttons
            categories.forEach(category => {
                const categoryBtn = document.createElement('button');
                categoryBtn.className = `category-btn px-6 py-3 rounded-lg transition-colors relative group ${currentCategory === category ? 'category-active' : 'category-inactive'}`;
                categoryBtn.dataset.category = category;
                categoryBtn.innerHTML = `
                    ${category}
                    <button class="absolute -top-2 -right-2 text-red-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"
                            onclick="event.stopPropagation(); showDeleteCategoryConfirm('${category}')">
                        <i class="fa fa-times-circle"></i>
                    </button>
                `;
                categoryBtn.addEventListener('click', () => {
                    currentCategory = category;
                    updateCategoryButtons();
                    renderWebsites();
                });
                
                // Insert before add category button
                categoryContainer.insertBefore(categoryBtn, addCategoryBtn);
            });
            
            // Add event listener to "all" button
            const allButton = categoryContainer.querySelector('[data-category="all"]');
            if (allButton) {
                // Remove existing event listeners
                const newAllButton = allButton.cloneNode(true);
                allButton.parentNode.replaceChild(newAllButton, allButton);
                
                // Add new event listener
                newAllButton.addEventListener('click', () => {
                    currentCategory = 'all';
                    updateCategoryButtons();
                    renderWebsites();
                });
            }
        }

        // Update category buttons
        function updateCategoryButtons() {
            const categoryBtns = document.querySelectorAll('.category-btn');
            categoryBtns.forEach(btn => {
                if (btn.dataset.category === currentCategory) {
                    btn.classList.remove('category-inactive');
                    btn.classList.add('category-active');
                } else {
                    btn.classList.remove('category-active');
                    btn.classList.add('category-inactive');
                }
            });
        }

        // Update category select in add modal
        function updateCategorySelect() {
            const categorySelect = document.getElementById('siteCategory');
            const existingOptions = categorySelect.querySelectorAll('option:not([value=""])');
            existingOptions.forEach(option => option.remove());
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                option.className = 'bg-dark text-light';
                categorySelect.appendChild(option);
            });
        }

        // Save categories to local storage
        function saveCategoriesToLocalStorage() {
            localStorage.setItem('bookmarkCategories', JSON.stringify(categories));
        }

        // Reset icon selection when modal is opened
        function openModal() {
            addModal.classList.remove('hidden');
            addModal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            
            // Reset icon selection
            iconOptions.forEach(opt => opt.classList.remove('bg-primary/30', 'ring-2', 'ring-primary'));
            selectedIconInput.value = 'fa-globe';
            
            // Select the default icon
            const defaultIcon = document.querySelector('[data-icon="fa-globe"]');
            if (defaultIcon) {
                defaultIcon.classList.add('bg-primary/30', 'ring-2', 'ring-primary');
            }
        }

        // Save to local storage
        function saveToLocalStorage() {
            localStorage.setItem('bookmarkWebsites', JSON.stringify(websites));
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 px-6 py-3 rounded-lg z-50 transition-all transform translate-x-full opacity-0`;
            
            if (type === 'success') {
                notification.classList.add('bg-green-500', 'text-white');
            } else if (type === 'error') {
                notification.classList.add('bg-red-500', 'text-white');
            } else {
                notification.classList.add('bg-primary', 'text-white');
            }
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Show
            setTimeout(() => {
                notification.classList.remove('translate-x-full', 'opacity-0');
            }, 100);
            
            // Hide
            setTimeout(() => {
                notification.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
